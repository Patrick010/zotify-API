# Logging Configuration for Zotify API

# This file defines which log handlers are active and their settings.
# The LoggingService will discover and initialize handlers based on this config.

handlers:
  - type: console
    class: zotify_api.core.logging_handlers.console.ConsoleHandler
    levels:
      - DEBUG
      - INFO
      - WARNING
      - ERROR
      - CRITICAL

  - type: audit
    class: zotify_api.core.logging_handlers.json_audit.JsonAuditHandler
    filename: "storage/audit.json.log"

  - type: job
    class: zotify_api.core.logging_handlers.database_job.DatabaseJobHandler
